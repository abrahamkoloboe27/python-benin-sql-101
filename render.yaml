# Infrastructure-as-Code pour Render (https://render.com)
# Ce fichier configure le déploiement automatique du backend sur Render.
#
# ⚠️  Avant de déployer, définissez les variables d'environnement dans le dashboard Render :
#     Dashboard → Service → Environment → Add Environment Variable

services:
  - type: web
    name: python-benin-sql-101-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci --omit=dev
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false   # ← à renseigner manuellement dans le dashboard Render
      - key: DATABASE_URL
        sync: false   # ← URL de connexion Supabase, à renseigner dans le dashboard Render
